version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${CONTAINER_NAME}
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${PORT}"
    volumes:
      - ${VOLUME_PATH}

volumes:
  postgres_data: